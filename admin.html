<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주봐 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#08080f;color:#e8dcc8;font-family:'Noto Serif KR',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:440px;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:30px;}
.title{font-size:22px;font-weight:700;color:#c9a84c;text-align:center;margin-bottom:6px;letter-spacing:3px;}
.sub{font-size:11px;color:#6a5a4a;text-align:center;margin-bottom:24px;letter-spacing:2px;}
.lbl{font-size:10px;letter-spacing:3px;color:#c9a84c;display:block;margin-bottom:6px;margin-top:14px;}
.inp{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:9px;padding:12px 14px;color:#f0e6d0;font-size:14px;outline:none;width:100%;font-family:inherit;}
.inp:focus{border-color:rgba(201,168,76,.5);}
select.inp option{background:#120e1c;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#b8922a,#e8c96a);border:none;border-radius:11px;color:#08080f;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:20px;font-family:inherit;}
.btn:hover{opacity:.9;}
.result{margin-top:20px;padding:18px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:11px;display:none;}
.result-code{font-size:26px;font-weight:700;color:#c9a84c;text-align:center;letter-spacing:4px;margin:10px 0;font-family:monospace;}
.result-info{font-size:11px;color:#9a8a6a;text-align:center;line-height:1.8;}
.copy-btn{width:100%;padding:10px;background:transparent;border:1px solid rgba(201,168,76,.3);border-radius:9px;color:#c9a84c;font-size:12px;cursor:pointer;margin-top:8px;letter-spacing:1px;font-family:inherit;}
.copy-btn:hover{background:rgba(201,168,76,.08);}
.err{margin-top:12px;padding:12px;background:rgba(180,50,50,.1);border:1px solid rgba(180,50,50,.3);border-radius:9px;color:#e08080;font-size:12px;text-align:center;display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">☯ 관리자</div>
    <div class="sub">구독 코드 생성</div>
    
    <label class="lbl">관리자 비밀번호</label>
    <input class="inp" type="password" id="password" placeholder="비밀번호">
    
    <label class="lbl">사용자 이메일</label>
    <input class="inp" type="email" id="email" placeholder="user@example.com">
    
    <label class="lbl">구독 기간</label>
    <select class="inp" id="days">
      <option value="7">7일 (체험)</option>
      <option value="30" selected>30일 (1개월)</option>
      <option value="90">90일 (3개월)</option>
      <option value="365">365일 (1년)</option>
    </select>
    
    <button class="btn" onclick="generateCode()">구독 코드 생성</button>
    
    <div class="err" id="err"></div>
    
    <div class="result" id="result">
      <div style="font-size:10px;color:#6a5a4a;text-align:center;margin-bottom:6px;letter-spacing:2px;">생성된 코드</div>
      <div class="result-code" id="result-code"></div>
      <div class="result-info" id="result-info"></div>
      <button class="copy-btn" onclick="copyCode()">📋 코드 복사</button>
      <button class="copy-btn" onclick="copyMsg()">💬 카카오톡 메시지 복사</button>
    </div>
  </div>
</div>

<script>
var currentCode = '';
var currentEmail = '';
var currentDays = 30;

async function generateCode() {
  var password = document.getElementById('password').value;
  var email = document.getElementById('email').value;
  var days = document.getElementById('days').value;
  var err = document.getElementById('err');
  var result = document.getElementById('result');
  
  err.style.display = 'none';
  result.style.display = 'none';
  
  if (!password || !email) {
    err.textContent = '비밀번호와 이메일을 입력해주세요.';
    err.style.display = 'block';
    return;
  }
  
  try {
    var res = await fetch('/api/admin', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'generate', password:password, email:email, days:parseInt(days)})
    });
    var data = await res.json();
    
    if (!res.ok) {
      err.textContent = data.error || '오류가 발생했습니다.';
      err.style.display = 'block';
      return;
    }
    
    currentCode = data.code;
    currentEmail = email;
    currentDays = parseInt(days);
    
    document.getElementById('result-code').textContent = data.code;
    document.getElementById('result-info').innerHTML = 
      '이메일: ' + email + '<br>기간: ' + days + '일<br>유효: 발급일로부터 7일 이내 사용';
    result.style.display = 'block';
    
  } catch(e) {
    err.textContent = '서버 오류가 발생했습니다.';
    err.style.display = 'block';
  }
}

function copyCode() {
  navigator.clipboard.writeText(currentCode);
  alert('코드 복사됨: ' + currentCode);
}

function copyMsg() {
  var msg = '안녕하세요! 사주봐 구독해주셔서 감사합니다 🌟\n\n구독 코드: ' + currentCode + '\n기간: ' + currentDays + '일\n\nsajubao.com 접속 후\n이메일(' + currentEmail + ')과 코드를 입력하시면\n커리어 분석을 보실 수 있습니다!\n\n감사합니다 ☯';
  navigator.clipboard.writeText(msg);
  alert('메시지 복사됨!');
}
</script>
</body>
</html>
