<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주봐 — AI 사주 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#08080f;color:#e8dcc8;font-family:'Noto Serif KR',serif;line-height:1.6;}
.hidden{display:none!important;}
.wrap{max-width:100%;margin:0 auto;}
header{background:linear-gradient(135deg,rgba(0,0,0,.8),rgba(20,10,30,.8));padding:20px;text-align:center;border-bottom:1px solid rgba(201,168,76,.1);}
.logo{font-size:28px;font-weight:700;letter-spacing:8px;color:#c9a84c;margin-bottom:8px;}
.tagline{font-size:12px;color:#9a8a6a;letter-spacing:2px;}
#s-form{padding:40px 20px;}
#s-loading,#s-main{padding:20px;}
.form-group{margin-bottom:20px;}
.form-label{font-size:11px;letter-spacing:3px;color:#c9a84c;display:block;margin-bottom:8px;}
input,select{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:9px;padding:12px 14px;color:#f0e6d0;font-family:inherit;font-size:14px;outline:none;width:100%;}
input:focus,select:focus{border-color:rgba(201,168,76,.6);}
select option{background:#120e1c;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,#b8922a,#e8c96a);border:none;border-radius:11px;color:#08080f;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:20px;}
.btn:hover{opacity:.9;}
.progress{margin:20px 0;text-align:center;color:#6a5a4a;font-size:12px;}
.spin{display:inline-block;width:24px;height:24px;border:2px solid rgba(201,168,76,.3);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.mj-chart{background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.15);border-radius:14px;padding:20px;margin:20px 0;}
.mj-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:16px 0;}
.mj-col{text-align:center;}
.mj-char{font-size:32px;color:#c9a84c;margin-bottom:8px;}
.mj-sub{font-size:10px;color:#6a5a4a;line-height:1.6;}
.sec-list{margin-top:20px;}
.sec-item{margin-bottom:12px;border:1px solid rgba(201,168,76,.1);border-radius:12px;overflow:hidden;}
.sec-hd{display:flex;align-items:center;gap:12px;padding:16px;background:rgba(255,255,255,.01);cursor:pointer;user-select:none;}
.sec-hd:hover{background:rgba(201,168,76,.05);}
.sec-icon{font-size:20px;}
.sec-ttl{flex:1;font-size:14px;font-weight:600;}
.sec-st{font-size:11px;color:#6a5a4a;padding:4px 10px;background:rgba(0,0,0,.3);border-radius:6px;}
.sec-bd{max-height:0;overflow:hidden;transition:max-height .3s;}
.sec-bd.open{max-height:1000px;}
.sec-txt{padding:16px;color:#c9a84c;font-size:13px;line-height:1.8;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">SAJU봐</div>
    <div class="tagline">사주봐 — AI 사주 분석</div>
  </header>

  <div id="s-form">
    <div style="margin-bottom:30px;text-align:center;">
      <div style="font-size:18px;color:#f0e6d0;margin-bottom:8px;font-weight:600;">생년월일시 입력</div>
      <div style="font-size:12px;color:#6a5a4a;">AI가 당신의 사주를 분석합니다</div>
    </div>
    
    <div class="form-group">
      <label class="form-label">이름</label>
      <input type="text" id="f-name" placeholder="예: 홍길동">
    </div>

    <div class="form-row">
      <div>
        <label class="form-label">태어난 해</label>
        <input type="number" id="f-year" placeholder="예: 1990" min="1900" max="2025">
      </div>
      <div>
        <label class="form-label">성별</label>
        <select id="f-gender">
          <option value="male">남성</option>
          <option value="female">여성</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div>
        <label class="form-label">월</label>
        <input type="number" id="f-month" placeholder="예: 3" min="1" max="12">
      </div>
      <div>
        <label class="form-label">일</label>
        <input type="number" id="f-day" placeholder="예: 15" min="1" max="31">
      </div>
    </div>

    <div class="form-row">
      <div>
        <label class="form-label">시 (24시간)</label>
        <input type="number" id="f-hour" placeholder="예: 10" min="0" max="23">
      </div>
      <div>
        <label class="form-label">분</label>
        <input type="number" id="f-minute" placeholder="예: 30" min="0" max="59">
      </div>
    </div>

    <button class="btn" onclick="startAnalysis()">내 사주 분석하기</button>
  </div>

  <div id="s-loading" class="hidden">
    <div style="padding:60px 20px;text-align:center;">
      <div class="spin"></div>
      <div style="margin-top:20px;color:#6a5a4a;">명반을 읽고 있습니다...</div>
    </div>
  </div>

  <div id="s-main" class="hidden">
    <div style="padding:20px;text-align:center;margin-bottom:20px;">
      <div id="r-name" style="font-size:24px;color:#f0e6d0;font-weight:600;"></div>
      <div id="r-meta" style="font-size:12px;color:#6a5a4a;margin-top:8px;"></div>
    </div>

    <div class="mj-chart">
      <div style="font-size:12px;color:#6a5a4a;margin-bottom:12px;">명식</div>
      <div id="mj-res"></div>
    </div>

    <div style="margin:20px 0;">
      <div style="font-size:12px;color:#6a5a4a;margin-bottom:10px;">분석 진행률</div>
      <div id="prg" style="height:4px;background:rgba(201,168,76,.2);border-radius:2px;overflow:hidden;">
        <div style="height:100%;background:linear-gradient(90deg,#b8922a,#e8c96a);width:0%;transition:width .3s;"></div>
      </div>
      <div id="prg-txt" style="font-size:10px;color:#6a5a4a;margin-top:6px;text-align:right;"></div>
    </div>

    <div id="sec-list"></div>
  </div>
</div>

<script>
const SECS=[
  {id:'s1',i:'✨',t:'일간 성격과 기질'},
  {id:'s2',i:'⚖️',t:'오행 구조와 용신'},
  {id:'s3',i:'🎯',t:'핵심 재능 키워드'},
  {id:'s4',i:'📊',t:'오행 세력 분석'},
  {id:'s5',i:'🎨',t:'기질 심성'},
  {id:'s6',i:'💡',t:'인생관과 가치관'},
  {id:'s7',i:'🔗',t:'종합 정리'},
  {id:'s8',i:'🌟',t:'흥신 & 쇠신'},
  {id:'s9',i:'⚡',t:'행운의 원리'},
  {id:'s10',i:'⏳',t:'생애 흐름 현재~40대'},
  {id:'s11',i:'🎯',t:'생애 흐름 40대~70대'},
  {id:'s12',i:'🗺️',t:'주의할 점'}
];

const FREE_SECS=['s1','s2','s3'];
let G={form:{},saju:{},secs:{},openSec:null};

function mjHTML(s){
  return `<div class="mj-row">
    <div class="mj-col"><div class="mj-char">${s.year.c}</div><div class="mj-sub">년주<br>${s.year.o}</div></div>
    <div class="mj-col"><div class="mj-char">${s.month.c}</div><div class="mj-sub">월주<br>${s.month.o}</div></div>
    <div class="mj-col"><div class="mj-char">${s.day.c}</div><div class="mj-sub">일주<br>${s.day.o}</div></div>
    <div class="mj-col"><div class="mj-char">${s.time.c}</div><div class="mj-sub">시주<br>${s.time.o}</div></div>
  </div>`;
}

function initSecs(){
  const l=document.getElementById('sec-list');
  l.innerHTML=SECS.map(s=>{
    const isFree=FREE_SECS.includes(s.id);
    const tag=isFree?'<span style="color:#6db36d;font-size:10px;">무료</span>':'<span style="color:#c9a84c;font-size:10px;">🔒 구독</span>';
    return`<div class="sec-item" id="si-${s.id}"><div class="sec-hd" onclick="togSec('${s.id}')"><span class="sec-icon">${s.i}</span><span class="sec-ttl">${s.t} ${tag}</span><span class="sec-st wait" id="st-${s.id}">대기</span></div><div class="sec-bd" id="sb-${s.id}"><div class="sec-txt" id="txt-${s.id}"></div></div></div>`;
  }).join('');
}

function togSec(id){
  const b=document.getElementById('sb-'+id);
  const open=b.classList.contains('open');
  document.querySelectorAll('.sec-bd').forEach(x=>x.classList.remove('open'));
  if(!open){
    b.classList.add('open');
    G.openSec=id;
  } else G.openSec=null;
}

function updPrg(done,total){
  const pct=Math.round(done*100/total);
  document.querySelector('#prg > div').style.width=pct+'%';
  document.getElementById('prg-txt').textContent=done+'/'+total+' 완료';
}

function updSec(id,status,text=''){
  const st=document.getElementById('st-'+id);
  if(!st)return;
  st.className='sec-st '+status;
  st.textContent=status==='done'?'완료':'분석 중…';
  if(text){
    const tx=document.getElementById('txt-'+id);
    tx.textContent=text;
  }
}

async function api(sys,msg){
  const r=await fetch('/api/analyze',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system:sys,user:msg})
  });
  if(!r.ok)throw new Error(await r.text());
  const d=await r.json();
  return d.text||'오류';
}

function makeQ(id,dc,ka,ma,ds){
  return `사주: ${dc}\n분석 대상: ${SECS.find(x=>x.id===id).t}\n\n간단하고 명확하게 한국어로만 답하세요.`;
}

async function startAnalysis(){
  const nm=document.getElementById('f-name').value;
  const yr=parseInt(document.getElementById('f-year').value);
  const mo=parseInt(document.getElementById('f-month').value);
  const dy=parseInt(document.getElementById('f-day').value);
  const hr=parseInt(document.getElementById('f-hour').value);
  const mn=parseInt(document.getElementById('f-minute').value);
  const gd=document.getElementById('f-gender').value;

  if(!nm||!yr||!mo||!dy||isNaN(hr)||isNaN(mn)){
    alert('모든 정보를 입력해주세요');
    return;
  }

  document.getElementById('s-form').classList.add('hidden');
  document.getElementById('s-loading').classList.remove('hidden');

  try{
    const sj={year:{c:'甲',o:'목'},month:{c:'寅',o:'목'},day:{c:'午',o:'화'},time:{c:'寅',o:'목'}};
    const dc=yr+'.'+mo+'.'+dy+' '+hr+':'+mn.toString().padStart(2,'0');
    const ka=new Date().getFullYear()-yr+1;
    const ma=new Date().getFullYear()-yr;
    const ds='갑';

    G.form={name:nm,year:yr,month:mo,day:dy,hour:hr,minute:mn,gender:gd};
    G.saju=sj;
    G.dc=dc;

    document.getElementById('s-loading').classList.add('hidden');
    document.getElementById('s-main').classList.remove('hidden');
    document.getElementById('r-name').textContent=nm||'명반 분석 결과';
    document.getElementById('r-meta').textContent=yr+'.'+mo+'.'+dy+' '+hr+':'+mn.padStart(2,'0')+' · '+(gd==='female'?'여성':'남성');
    document.getElementById('mj-res').innerHTML=mjHTML(sj);
    initSecs();

    let done=0;
    for(let i=0;i<SECS.length;i+=6){
      const chunk=SECS.slice(i,i+6);
      await Promise.all(chunk.map(async s=>{
        updSec(s.id,'run');
        try{
          const t=await api('당신은 사주명리학 전문가입니다. 명리적 근거를 반드시 포함하세요.',makeQ(s.id,dc,ka,ma,ds));
          G.secs[s.id]={t,done:true};
          updSec(s.id,'done',t);
        }catch(e){
          updSec(s.id,'done','오류');
        }
        done++;updPrg(done,SECS.length);
        if(done===1)setTimeout(()=>{const sb=document.getElementById('sb-s1');if(sb)sb.classList.add('open');},100);
      }));
    }
  }catch(e){
    alert('오류: '+e.message);
    document.getElementById('s-loading').classList.add('hidden');
    document.getElementById('s-form').classList.remove('hidden');
  }
}

window.addEventListener('DOMContentLoaded',()=>{});
</script>
</body>
</html>
