<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>사주 생애 로드맵</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#08080f;color:#e8dcc8;font-family:'Noto Serif KR',serif;min-height:100vh;}
.bg{min-height:100vh;background:radial-gradient(ellipse at 20% 10%,#160f22,#08080f 55%);}
.header{text-align:center;padding:52px 20px 36px;}
.sym{font-size:42px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 18px rgba(201,168,76,.6));animation:fl 4s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.badge{font-family:'Cinzel',serif;font-size:10px;letter-spacing:6px;color:#c9a84c;text-transform:uppercase;margin-bottom:9px;}
.title{font-size:24px;font-weight:300;letter-spacing:2px;line-height:1.7;color:#f0e6d0;}
.divl{width:60px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:16px auto;}
.sub{font-size:12px;color:#6a5a4a;letter-spacing:1px;line-height:1.9;}
.wrap{max-width:760px;margin:0 auto;padding:0 18px 80px;}
.card{background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px;}
.full{grid-column:1/-1;}
.lbl{font-size:10px;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;display:block;margin-bottom:5px;}
.inp{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.18);border-radius:9px;padding:11px 13px;color:#f0e6d0;font-family:'Noto Serif KR',serif;font-size:14px;outline:none;transition:all .25s;width:100%;}
.inp:focus{border-color:rgba(201,168,76,.6);background:rgba(201,168,76,.05);}
select.inp option{background:#120e1c;}
textarea.inp{resize:vertical;min-height:68px;line-height:1.7;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#b8922a,#e8c96a,#b8922a);background-size:200%;border:none;border-radius:11px;color:#08080f;font-family:'Noto Serif KR',serif;font-size:14px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .3s;margin-top:8px;box-shadow:0 4px 24px rgba(201,168,76,.3);animation:sh 3s ease infinite;}
@keyframes sh{0%{background-position:0%;}50%{background-position:100%;}100%{background-position:0%;}}
.btn:hover{transform:translateY(-2px);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn2{width:100%;padding:12px;background:transparent;border:1px solid rgba(201,168,76,.26);border-radius:11px;color:#c9a84c;font-family:'Noto Serif KR',serif;font-size:12px;letter-spacing:3px;cursor:pointer;transition:all .25s;margin-top:9px;}
.btn2:hover{background:rgba(201,168,76,.07);}
.err{background:rgba(180,50,50,.1);border:1px solid rgba(180,50,50,.28);border-radius:9px;padding:12px;color:#e08080;font-size:12px;text-align:center;margin-top:11px;}
.ldg{text-align:center;padding:36px 20px;}
.ring{width:50px;height:50px;border:2px solid rgba(201,168,76,.12);border-top:2px solid #c9a84c;border-radius:50%;animation:spin 1.1s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.ldg-t{font-size:12px;color:#6a5a4a;letter-spacing:2px;}
.prg{background:rgba(255,255,255,.05);border-radius:5px;height:4px;overflow:hidden;margin:10px 0 6px;}
.prg-b{height:4px;background:linear-gradient(90deg,#c9a84c,#e8c96a);border-radius:5px;transition:width .5s ease;}
.tabs{display:flex;gap:5px;margin-bottom:20px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 12px;border-radius:24px;border:1px solid rgba(201,168,76,.15);background:rgba(255,255,255,.02);color:#6a5a4a;font-family:'Noto Serif KR',serif;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab:hover{border-color:rgba(201,168,76,.4);color:#c9a84c;}
.tab.on{border-color:#c9a84c;background:rgba(201,168,76,.1);color:#f0e6d0;}
.mj{background:rgba(0,0,0,.28);border:1px solid rgba(201,168,76,.13);border-radius:12px;overflow:hidden;margin-bottom:18px;}
.mj-hd{display:grid;grid-template-columns:44px 1fr 1fr 1fr 1fr;border-bottom:1px solid rgba(201,168,76,.08);}
.mj-hc{padding:8px 3px;font-size:10px;letter-spacing:2px;color:#6a5a4a;text-align:center;}
.mj-row{display:grid;grid-template-columns:44px 1fr 1fr 1fr 1fr;border-top:1px solid rgba(201,168,76,.05);}
.mj-lbl{padding:10px 3px;font-size:10px;color:#5a4a3a;text-align:center;display:flex;align-items:center;justify-content:center;}
.mj-cell{padding:10px 3px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.mj-h{font-size:18px;font-weight:600;line-height:1;}
.mj-k{font-size:9px;color:#5a4a3a;}
.mj-e{font-size:9px;padding:1px 4px;border-radius:3px;background:rgba(255,255,255,.04);}
.rh{text-align:center;margin-bottom:18px;}
.rn{font-size:19px;font-weight:600;color:#f0e6d0;margin-bottom:4px;}
.rm{font-size:11px;color:#c9a84c;letter-spacing:2px;}
.sec-list{display:flex;flex-direction:column;gap:8px;}
.sec-item{background:rgba(0,0,0,.25);border:1px solid rgba(201,168,76,.1);border-radius:13px;overflow:hidden;}
.sec-hd{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;user-select:none;}
.sec-hd:hover{background:rgba(201,168,76,.04);}
.sec-icon{font-size:14px;flex-shrink:0;}
.sec-ttl{flex:1;font-size:13px;color:#e0d0b4;font-weight:600;}
.sec-st{font-size:10px;flex-shrink:0;}
.sec-st.done{color:#6db36d;}
.sec-st.run{color:#c9a84c;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.4;}50%{opacity:1;}}
.sec-st.wait{color:#4a3a2a;}
.sec-bd{display:none;padding:16px 15px;}
.sec-bd.open{display:block;animation:pi .3s ease;}
@keyframes pi{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
/* 마크다운 렌더링 스타일 */
.sec-txt{font-size:13.5px;color:#d0c0a4;line-height:2.0;}
.sec-txt h2{font-size:15px;color:#c9a84c;font-weight:700;margin:18px 0 8px;padding-left:10px;border-left:3px solid #c9a84c;letter-spacing:1px;}
.sec-txt h3{font-size:14px;color:#e8d8b4;font-weight:600;margin:14px 0 6px;}
.sec-txt p{margin-bottom:10px;line-height:2.0;}
.sec-txt strong{color:#f0e6d0;font-weight:700;}
.sec-txt em{color:#c9a84c;font-style:normal;}
.sec-txt ul,.sec-txt ol{margin:8px 0 12px 4px;padding-left:4px;}
.sec-txt li{margin-bottom:7px;line-height:1.9;padding-left:14px;position:relative;}
.sec-txt ul li::before{content:'✦';position:absolute;left:0;color:#c9a84c;font-size:9px;top:6px;}
.sec-txt ol{counter-reset:ol;}
.sec-txt ol li{counter-increment:ol;}
.sec-txt ol li::before{content:counter(ol)'.';position:absolute;left:0;color:#c9a84c;font-size:11px;font-weight:700;}
.sec-txt table{width:100%;border-collapse:collapse;margin:12px 0;border-radius:10px;overflow:hidden;}
.sec-txt th{background:rgba(201,168,76,.15);color:#c9a84c;padding:9px 12px;font-size:11px;letter-spacing:1px;text-align:left;font-weight:600;}
.sec-txt td{padding:9px 12px;border-top:1px solid rgba(201,168,76,.08);font-size:12.5px;color:#d0c0a4;vertical-align:top;}
.sec-txt tr:hover td{background:rgba(201,168,76,.04);}
.sec-txt hr{border:none;border-top:1px solid rgba(201,168,76,.15);margin:14px 0;}
.info-card{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.03));border:1px solid rgba(201,168,76,.25);border-radius:14px;padding:16px 18px;margin:12px 0;}
.ic-row{padding:6px 0;border-bottom:1px solid rgba(201,168,76,.08);font-size:13px;color:#d8c8a8;line-height:1.8;}
.ic-row:last-child{border-bottom:none;}
.ic-row:first-child{font-size:14px;font-weight:700;color:#c9a84c;padding-bottom:8px;margin-bottom:4px;}
.sec-txt blockquote{border-left:3px solid #c9a84c;padding:10px 14px;margin:10px 0;background:rgba(201,168,76,.06);border-radius:0 10px 10px 0;color:#c9a84c;}
.sec-txt .kw{display:inline-block;padding:3px 10px;border-radius:20px;background:rgba(201,168,76,.12);color:#c9a84c;font-size:12px;margin:3px 3px 3px 0;border:1px solid rgba(201,168,76,.25);}
.rc{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.1);border-radius:14px;padding:22px;line-height:2.0;font-size:13.5px;color:#d0c0a4;}
.rc h2{font-size:14px;color:#c9a84c;font-weight:700;margin:16px 0 7px;padding-left:9px;border-left:3px solid #c9a84c;}
.rc h3{font-size:13px;color:#e8d8b4;font-weight:600;margin:12px 0 5px;}
.rc p{margin-bottom:9px;line-height:2.0;}
.rc strong{color:#f0e6d0;font-weight:700;}
.rc ul{margin:6px 0 10px 4px;}
.rc li{margin-bottom:6px;padding-left:14px;position:relative;}
.rc ul li::before{content:'✦';position:absolute;left:0;color:#c9a84c;font-size:9px;top:6px;}
.rc hr{border:none;border-top:1px solid rgba(201,168,76,.15);margin:12px 0;}
.jin-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px;}
.jin-c{background:rgba(0,0,0,.25);border:1px solid rgba(201,168,76,.11);border-radius:10px;padding:12px;text-align:center;}
.jin-l{font-size:9px;letter-spacing:2px;color:#7a6a5a;margin-bottom:5px;}
.jin-p{font-size:20px;font-weight:600;line-height:1.3;}
.jin-e{font-size:10px;margin-top:2px;}
.cc{display:grid;grid-template-columns:1fr 22px 1fr;gap:5px;align-items:start;margin-bottom:12px;}
.cv{text-align:center;color:#c9a84c;font-size:14px;padding-top:46px;}
.cpn{font-size:12px;color:#f0e6d0;text-align:center;margin-bottom:5px;font-weight:600;}
.dl{position:relative;padding-left:14px;}
.dt{position:absolute;left:23px;top:6px;bottom:6px;width:1px;background:linear-gradient(to bottom,transparent,rgba(201,168,76,.3),transparent);}
.dr{display:flex;gap:11px;margin-bottom:12px;}
.dd{flex-shrink:0;width:11px;height:11px;border-radius:50%;border:2px solid;background:#08080f;margin-top:4px;z-index:1;position:relative;}
.dd.now{width:15px;height:15px;margin-top:2px;box-shadow:0 0 8px currentColor;}
.db{flex:1;background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.09);border-radius:10px;padding:11px 13px;}
.db.now{border-color:rgba(201,168,76,.38);background:rgba(201,168,76,.05);}
.da{font-size:10px;letter-spacing:2px;color:#7a6a5a;margin-bottom:2px;}
.dp2{font-size:16px;font-weight:600;margin-bottom:2px;}
.dth{font-size:12px;color:#c9a84c;margin-bottom:4px;}
.dds{font-size:12px;color:#9a8a72;line-height:1.8;}
.cg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px;}
.chip{padding:8px 13px;border-radius:22px;border:1px solid rgba(201,168,76,.17);background:rgba(255,255,255,.02);color:#8a7a62;font-family:'Noto Serif KR',serif;font-size:13px;cursor:pointer;transition:all .2s;}
.chip:hover{border-color:rgba(201,168,76,.43);color:#e8dcc8;}
.chip.on{border-color:#c9a84c;background:rgba(201,168,76,.1);color:#f0e6d0;}
.sl{font-size:10px;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;margin-bottom:8px;margin-top:6px;display:block;}
.pi2{background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.08);border-left:3px solid #c9a84c;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.pp3{font-size:10px;letter-spacing:2px;color:#c9a84c;margin-bottom:4px;}
.pg3{font-size:14px;font-weight:600;color:#f0e6d0;margin-bottom:6px;line-height:1.5;}
.pgd{font-size:13px;color:#c0aa84;line-height:1.9;margin-bottom:7px;}
.pr{font-size:11px;color:#5a4a34;padding:6px 10px;background:rgba(201,168,76,.04);border-radius:7px;border-left:2px solid rgba(201,168,76,.17);}
.pr::before{content:'✦ ';color:#c9a84c;}
.hidden{display:none!important;}
@media(max-width:480px){.fg2{grid-template-columns:1fr;}.card{padding:20px 13px;}.title{font-size:20px;}.mj-h{font-size:16px;}.jin-g{grid-template-columns:1fr 1fr;}.tab{font-size:11px;padding:7px 9px;}}
</style>
</head>
<body>
<div class="bg">
<div class="header">
  <span class="sym">☯</span>
  <div class="badge">Destiny Roadmap</div>
  <h1 class="title">사주 생애 로드맵</h1>
  <div class="divl"></div>
  <p class="sub">생년월일시를 입력하면 사주팔자를 정밀 계산하고<br>AI가 생애 전체 흐름을 분석합니다</p>
</div>
<div class="wrap">
<div id="s-form" class="card">
  <div class="fg2">
    <div class="full"><label class="lbl">이름 (선택)</label><input class="inp" id="f-name" placeholder="이름을 입력하세요"></div>
    <div><label class="lbl">태어난 해</label><input class="inp" id="f-year" placeholder="예: 1994" maxlength="4" inputmode="numeric"></div>
    <div><label class="lbl">성별</label><select class="inp" id="f-gender"><option value="female">여성</option><option value="male">남성</option></select></div>
    <div><label class="lbl">월</label><input class="inp" id="f-month" placeholder="예: 4" maxlength="2" inputmode="numeric"></div>
    <div><label class="lbl">일</label><input class="inp" id="f-day" placeholder="예: 20" maxlength="2" inputmode="numeric"></div>
    <div><label class="lbl">시 (24시간)</label><input class="inp" id="f-hour" placeholder="예: 14" maxlength="2" inputmode="numeric"></div>
    <div><label class="lbl">분</label><input class="inp" id="f-minute" placeholder="예: 47" maxlength="2" inputmode="numeric"></div>
  </div>
  <div id="f-err" class="err hidden"></div>
  <button class="btn" onclick="startAnalysis()">명반 분석 시작</button>
</div>
<div id="s-loading" class="hidden">
  <div id="mj-load"></div>
  <div class="ldg">
    <div class="prg"><div class="prg-b" id="prg" style="width:0%"></div></div>
    <div style="font-size:11px;color:#6a5a4a;margin-bottom:16px;" id="prg-t">0 / 12 완료</div>
    <div class="ring"></div>
    <div class="ldg-t">명반을 읽고 있습니다…</div>
  </div>
</div>
<div id="s-main" class="hidden">
  <div class="rh"><div class="rn" id="r-name"></div><div class="rm" id="r-meta"></div></div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('analysis',this)">☯ 명반</button>
    <button class="tab" onclick="switchTab('today',this)">☀️ 오늘</button>
    <button class="tab" onclick="switchTab('couple',this)">❤️ 궁합</button>
    <button class="tab" onclick="switchTab('daeun',this)">📅 대운</button>
    <button class="tab" onclick="switchTab('plan',this)">🗺️ 로드맵</button>
  </div>
  <div id="t-analysis">
    <div id="mj-res"></div>
    <div id="prg-wrap" style="margin-bottom:12px;"><div style="font-size:11px;color:#6a5a4a;margin-bottom:4px;" id="prg-t2">분석 중…</div><div class="prg"><div class="prg-b" id="prg2" style="width:0%"></div></div></div>
    <div class="sec-list" id="sec-list"></div>
    <button class="btn2" onclick="resetAll()">처음부터 다시 분석하기</button>
  </div>
  <div id="t-today" class="hidden">
    <div class="jin-g" id="jin-g"></div>
    <div id="today-ldg" class="ldg hidden"><div class="ring"></div><div class="ldg-t">운세를 읽는 중…</div></div>
    <div id="today-res" class="hidden"><div class="rc" id="today-txt"></div><button class="btn2" onclick="loadToday(true)">새로고침</button></div>
  </div>
  <div id="t-couple" class="hidden">
    <div id="c-form" class="card">
      <div style="text-align:center;font-size:12px;color:#7a6a5a;margin-bottom:13px;">상대방의 생년월일시를 입력하세요</div>
      <div class="fg2">
        <div class="full"><label class="lbl">상대방 이름 (선택)</label><input class="inp" id="c-name" placeholder="이름을 입력하세요"></div>
        <div><label class="lbl">태어난 해</label><input class="inp" id="c-year" placeholder="예: 1990" maxlength="4" inputmode="numeric"></div>
        <div><label class="lbl">성별</label><select class="inp" id="c-gender"><option value="male">남성</option><option value="female">여성</option></select></div>
        <div><label class="lbl">월</label><input class="inp" id="c-month" placeholder="예: 3" maxlength="2" inputmode="numeric"></div>
        <div><label class="lbl">일</label><input class="inp" id="c-day" placeholder="예: 15" maxlength="2" inputmode="numeric"></div>
        <div><label class="lbl">시 (모르면 12)</label><input class="inp" id="c-hour" value="12" maxlength="2" inputmode="numeric"></div>
        <div><label class="lbl">분</label><input class="inp" id="c-minute" value="00" maxlength="2" inputmode="numeric"></div>
      </div>
      <div id="c-err" class="err hidden"></div>
      <button class="btn" onclick="analyzeCouple()">궁합 분석하기</button>
    </div>
    <div id="c-ldg" class="ldg hidden"><div class="ring"></div><div class="ldg-t">궁합을 분석하는 중…</div></div>
    <div id="c-res" class="hidden">
      <div class="cc"><div><div class="cpn" id="my-nm"></div><div id="my-mj"></div></div><div class="cv">♡</div><div><div class="cpn" id="their-nm"></div><div id="their-mj"></div></div></div>
      <div class="rc" id="c-txt"></div>
      <button class="btn2" onclick="resetCouple()">다른 사람과 궁합 보기</button>
    </div>
  </div>
  <div id="t-daeun" class="hidden">
    <div id="d-ldg" class="ldg hidden"><div class="ring"></div><div class="ldg-t">대운을 계산하는 중…</div></div>
    <div id="d-res" class="dl hidden"><div class="dt"></div><div id="d-list"></div></div>
  </div>
  <div id="t-plan" class="hidden">
    <div id="p-form" class="card">
      <span class="sl">몇 년 계획?</span>
      <div class="cg"><div class="chip" onclick="selYr('1',this)">1년</div><div class="chip" onclick="selYr('3',this)">3년</div><div class="chip" onclick="selYr('5',this)">5년</div><div class="chip" onclick="selYr('10',this)">10년</div></div>
      <span class="sl">집중 영역</span>
      <div class="cg"><div class="chip" onclick="togArea('커리어',this)">💼 커리어</div><div class="chip" onclick="togArea('재물',this)">💰 재물</div><div class="chip" onclick="togArea('연애',this)">❤️ 연애</div><div class="chip" onclick="togArea('자기계발',this)">🌱 자기계발</div><div class="chip" onclick="togArea('건강',this)">🌿 건강</div><div class="chip" onclick="togArea('종합',this)">✦ 종합</div></div>
      <span class="sl">목표 (선택)</span>
      <textarea class="inp" id="p-goal" rows="3" placeholder="예: 프리랜서로 독립하고 싶어요"></textarea>
      <div id="p-err" class="err hidden"></div>
      <button class="btn" onclick="genPlan()">내 로드맵 만들기</button>
    </div>
    <div id="p-ldg" class="ldg hidden"><div class="ring"></div><div class="ldg-t">로드맵을 생성하는 중…</div></div>
    <div id="p-res" class="hidden"><div class="rh"><div class="rn" id="p-title"></div><div class="rm" id="p-areas"></div></div><div id="p-items"></div><button class="btn" onclick="resetPlan()">다른 조건으로 다시 계획</button></div>
  </div>
</div>
</div></div>
<script>
const ST=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BR=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const SKR=['갑','을','병','정','무','기','경','신','임','계'];
const BKR=['자','축','인','묘','진','사','오','미','신','유','술','해'];
const SEL=['木','木','火','火','土','土','金','金','水','水'];
const BEL=['水','土','木','木','土','火','火','土','金','金','土','水'];
const EC={木:'#6db36d',火:'#e06b6b',土:'#c9a84c',金:'#a8c0d4',水:'#6b9de0'};
function dfr(y,m,d){return Math.round((Date.UTC(y,m-1,d)-Date.UTC(1900,0,1))/86400000);}
function yp(yr,mo,d){let y=yr;if(mo<2||(mo===2&&d<4))y--;return{s:((y-4)%10+10)%10,b:((y-4)%12+12)%12};}
function mb(mo,d){const T=[[1,6,1],[2,4,2],[3,6,3],[4,5,4],[5,6,5],[6,6,6],[7,7,7],[8,8,8],[9,8,9],[10,8,10],[11,7,11],[12,7,0]];let b=11;for(let i=T.length-1;i>=0;i--){const[tm,td,tb]=T[i];if(mo>tm||(mo===tm&&d>=td)){b=tb;break;}}return b;}
function ms(ys,mb2){return([2,4,6,8,0,2,4,6,8,0][ys]+((mb2-2+12)%12))%10;}
function dp(y,m,d){const n=dfr(y,m,d);return{s:((n%10)+10)%10,b:(((n+10)%12)+12)%12};}
function hb(h){return h===23?0:Math.floor((h+1)/2);}
function hs(ds,hb2){return([0,2,4,6,8,0,2,4,6,8][ds]+hb2)%10;}
function calc(y,m,d,h){const Y=yp(y,m,d),MB=mb(m,d),MS=ms(Y.s,MB),DP=dp(y,m,d),HB=hb(h),HS=hs(DP.s,HB);return{year:{s:Y.s,b:Y.b},month:{s:MS,b:MB},day:{s:DP.s,b:DP.b},hour:{s:HS,b:HB}};}
function ps(p){return ST[p.s]+BR[p.b];}
function desc(sj){const e={};['year','month','day','hour'].forEach(k=>{const a=SEL[sj[k].s],b=BEL[sj[k].b];e[a]=(e[a]||0)+1;e[b]=(e[b]||0)+1;});return`년주:${ps(sj.year)} 월주:${ps(sj.month)} 일주:${ps(sj.day)}(일간${ST[sj.day.s]}) 시주:${ps(sj.hour)} / 오행:${Object.entries(e).map(([k,v])=>k+v).join(' ')}`;}
function tdp(){const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1,d=n.getDate(),h=n.getHours(),Y=yp(y,m,d),MB=mb(m,d),MS=ms(Y.s,MB),DP=dp(y,m,d),HB=hb(h),HS=hs(DP.s,HB);return{year:{s:Y.s,b:Y.b},month:{s:MS,b:MB},day:{s:DP.s,b:DP.b},hour:{s:HS,b:HB}};}
function mjHTML(sj){const cols=[{l:'시주',p:sj.hour},{l:'일주',p:sj.day},{l:'월주',p:sj.month},{l:'년주',p:sj.year}];const hc=cols.map(c=>`<div class="mj-hc">${c.l}</div>`).join('');const sc=cols.map(({p})=>`<div class="mj-cell"><span class="mj-h" style="color:${EC[SEL[p.s]]}">${ST[p.s]}</span><span class="mj-k">${SKR[p.s]}</span><span class="mj-e" style="color:${EC[SEL[p.s]]}">${SEL[p.s]}</span></div>`).join('');const bc=cols.map(({p})=>`<div class="mj-cell"><span class="mj-h" style="color:${EC[BEL[p.b]]}">${BR[p.b]}</span><span class="mj-k">${BKR[p.b]}</span><span class="mj-e" style="color:${EC[BEL[p.b]]}">${BEL[p.b]}</span></div>`).join('');return`<div class="mj"><div class="mj-hd"><div class="mj-hc"></div>${hc}</div><div class="mj-row"><div class="mj-lbl">천간</div>${sc}</div><div class="mj-row"><div class="mj-lbl">지지</div>${bc}</div></div>`;}
function mdHTML(t){if(!t)return'';let h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h2>$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^---+$/gm,'<hr>').replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // 코드블럭을 인포카드로 변환
  h=h.replace(/```[\s\S]*?```/g,m=>{
    const inner=m.replace(/^```\w*\n?/,'').replace(/```$/,'').trim();
    const rows=inner.split('\n').filter(r=>r.trim()&&!r.match(/^\|[-:\s|]+\|$/));
    const isTable=rows.length>0&&rows[0].includes('|');
    if(isTable){
      let tb='<table>';
      rows.forEach((r,i)=>{
        const cells=r.split('|').slice(1,-1);
        const tag=i===0?'th':'td';
        tb+=`<tr>${cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')}</tr>`;
      });
      return tb+'</table>';
    }
    // 일반 코드블럭 → 인포카드
    const lines=inner.split('\n').map(l=>{
      l=l.trim();
      if(!l)return'';
      // | 로 시작하는 줄 → 카드 아이템
      if(l.startsWith('|'))l=l.replace(/\|/g,'').trim();
      // ★ → 강조
      l=l.replace(/★/g,'<span style="color:#c9a84c">✦</span>');
      return`<div class="ic-row">${l}</div>`;
    }).filter(Boolean).join('');
    return`<div class="info-card">${lines}</div>`;
  });
h=h.replace(/(\|.+\|\n?)+/g,m=>{const rows=m.trim().split('\n').filter(r=>!/^\|[\s\-:|]+\|$/.test(r));if(!rows.length)return m;let tb='<table>';rows.forEach((r,i)=>{const cells=r.split('|').slice(1,-1);const tag=i===0?'th':'td';tb+=`<tr>${cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')}</tr>`;});return tb+'</table>';});
h=h.replace(/(^[-*•] .+\n?)+/gm,m=>{const items=m.trim().split('\n').filter(Boolean);return'<ul>'+items.map(i=>`<li>${i.replace(/^[-*•] /,'')}</li>`).join('')+'</ul>';});
h=h.replace(/(^\d+\. .+\n?)+/gm,m=>{const items=m.trim().split('\n').filter(Boolean);return'<ol>'+items.map(i=>`<li>${i.replace(/^\d+\. /,'')}</li>`).join('')+'</ol>';});
h=h.split('\n\n').map(p=>{p=p.trim();if(!p)return'';if(/^<(h[123]|ul|ol|table|hr|blockquote)/.test(p))return p;return`<p>${p.replace(/\n/g,'<br>')}</p>`;}).join('');
return h;}

const SYS=`당신은 사주명리학 전문가입니다. 아래 원칙을 반드시 지키세요.

2. 모든 분석에 반드시 명리적 근거(어떤 기둥, 어떤 오행, 어떤 십성)를 포함하세요.
3. 긍정적인 면과 주의할 점을 균형 있게 서술하세요.
4. 차분하고 신뢰감 있는 말투로, 한국어로만 답하세요.
5. 반드시 마크다운 형식(## 제목, **볼드**, - 리스트, | 표)을 활용해서 구조적으로 답하세요.`;
function makeQ(id,dc,ka,ma,ds){const B=`사주(정확히 계산됨, 수정금지): ${dc}\n한국나이 ${ka}세 / 만 ${ma}세\n\n`;switch(id){case 's1':return B+`## 일간 ${ds}의 성격과 기질\n\n본질적인 특성, 강점, 약점, 대인관계 방식, 내면의 욕구를 마크다운 형식으로 상세히 분석하세요.`;case 's2':return B+`## 오행 구조와 용신\n\n오행 강약을 표(표 형식 사용)로 정리하고, 용신과 희신이 무엇인지 이유와 함께, 실생활 활용법을 설명하세요.`;case 's3':return B+`## 핵심 재능 키워드 5가지\n\n각 키워드를 **볼드**로 표시하고, 어떤 기둥과 오행이 근거인지와 함께 설명하세요.`;case 's4':return B+`## 직업·커리어 방향\n\n잘 맞는 분야와 피해야 할 환경을 각각 리스트로 정리하고 명리 근거를 포함하세요.`;case 's5':return B+`## 재물운 구조\n\n재성 위치와 강약, 돈이 오는 방식, 재물운 흐름을 마크다운 형식으로 설명하세요.`;case 's6':return B+`## 연애·결혼 에너지\n\n연애 스타일, 배우자 인연, 결혼 에너지와 관계 주의점을 마크다운으로 분석하세요.`;case 's7':return B+`## 현재 대운 분석 (${ka}세)\n\n현재 대운명과 오행, 이 시기의 흐름, 기회, 주의점, 핵심 조언을 마크다운으로 설명하세요.`;case 's8':return B+`## 생애 흐름 — 현재~40대\n\n각 10년 단위를 표(나이대|핵심주제|해야할일) 형식으로 정리하세요.`;case 's9':return B+`## 생애 흐름 — 40대~70대\n\n각 10년 단위를 표(나이대|핵심주제|해야할일) 형식으로 정리하세요.`;case 's10':return B+`## 지금 당장 할 3가지 행동\n\n각 행동을 번호 리스트로 정리하고, 왜 이 사주에 맞는지 명리 근거를 포함하세요.`;case 's11':return B+`## 주의해야 할 점\n\n건강, 대인관계, 재물, 심리 측면을 각각 소제목(###)으로 나눠 근거와 대처법을 설명하세요.`;case 's12':return B+`## 이 명반의 독특한 특징\n\n다른 사주와 구별되는 가장 특이한 점을 **제목**과 함께 근거, 영향, 의미를 상세히 설명하세요.`;default:return B+`마크다운 형식으로 분석해주세요.`;}}

async function loadToday(force=false){if(tdLoaded&&!force)return;const tp=tdp(),n=new Date(),wd=['일','월','화','수','목','금','토'];const jin=document.getElementById('jin-g');jin.innerHTML=[{l:'오늘 일진',p:tp.day},{l:'이번달 월건',p:tp.month},{l:'올해 세운',p:tp.year}].map(({l,p})=>`<div class="jin-c"><div class="jin-l">${l}</div><div class="jin-p"><span style="color:${EC[SEL[p.s]]}">${ST[p.s]}</span><span style="color:${EC[BEL[p.b]]}">${BR[p.b]}</span></div><div class="jin-e" style="color:${EC[SEL[p.s]]}">${SEL[p.s]}·${BEL[p.b]}</div></div>`).join('');document.getElementById('today-ldg').classList.remove('hidden');document.getElementById('today-res').classList.add('hidden');const q=`사주:${G.dc} 성별:${G.form.gender==='female'?'여성':'남성'} 나이:${G.ka}세\n오늘:${n.getFullYear()}년${n.getMonth()+1}월${n.getDate()}일(${wd[n.getDay()]})\n일진:${ps(tp.day)} 월건:${ps(tp.month)} 세운:${ps(tp.year)}\n\n마크다운 형식으로: 오늘 일진과 사주의 상호작용, 오늘 유리한 것과 조심할 것, 이번 달 흐름, 올해 세운 흐름, 오늘 행동 제안 3가지를 분석하세요.`;try{const t=await api(SYS,q);document.getElementById('today-txt').innerHTML=mdHTML(t);document.getElementById('today-ldg').classList.add('hidden');document.getElementById('today-res').classList.remove('hidden');tdLoaded=true;}catch(e){document.getElementById('today-ldg').classList.add('hidden');document.getElementById('today-res').classList.remove('hidden');document.getElementById('today-txt').textContent='오류가 발생했습니다.';}}
async function analyzeCouple(){const yr=document.getElementById('c-year').value,mo=document.getElementById('c-month').value,dy=document.getElementById('c-day').value,hr=document.getElementById('c-hour').value||'12',nm=document.getElementById('c-name').value,gd=document.getElementById('c-gender').value;if(!yr||!mo||!dy){const e=document.getElementById('c-err');e.textContent='상대방 생년월일을 입력해주세요.';e.classList.remove('hidden');return;}document.getElementById('c-err').classList.add('hidden');document.getElementById('c-form').classList.add('hidden');document.getElementById('c-ldg').classList.remove('hidden');const csj=calc(parseInt(yr),parseInt(mo),parseInt(dy),parseInt(hr)),cd=desc(csj);document.getElementById('my-nm').textContent=G.form.name||'나';document.getElementById('their-nm').textContent=nm||'상대방';document.getElementById('my-mj').innerHTML=mjHTML(G.saju);document.getElementById('their-mj').innerHTML=mjHTML(csj);const q=`나(${G.form.name||'나'},${G.form.gender==='female'?'여성':'남성'},${G.ka}세):${G.dc}\n상대방(${nm||'상대방'},${gd==='female'?'여성':'남성'}):${cd}\n\n마크다운 형식으로: 오행 조화, 성격 궁합, 연애·결혼 궁합, 재물 궁합, 장기 전망, 주의점 2가지를 분석하고 100점 기준 종합점수와 총평을 써주세요.`;try{const t=await api(SYS,q);document.getElementById('c-txt').innerHTML=mdHTML(t);document.getElementById('c-ldg').classList.add('hidden');document.getElementById('c-res').classList.remove('hidden');}catch(e){document.getElementById('c-ldg').classList.add('hidden');document.getElementById('c-form').classList.remove('hidden');document.getElementById('c-err').textContent='오류.';document.getElementById('c-err').classList.remove('hidden');}}
function resetCouple(){document.getElementById('c-res').classList.add('hidden');document.getElementById('c-form').classList.remove('hidden');['c-name','c-year','c-month','c-day'].forEach(id=>document.getElementById(id).value='');document.getElementById('c-hour').value='12';document.getElementById('c-minute').value='00';}
let dLoaded=false;
async function loadDaeun(){if(dLoaded)return;document.getElementById('d-ldg').classList.remove('hidden');const q=`사주:${G.dc} 성별:${G.form.gender==='female'?'여성':'남성'} 한국나이:${G.ka}세\nJSON 배열만 반환하세요:\n[{"age_start":4,"age_end":13,"pillar":"癸酉","element":"水","theme":"탐색","desc":"흐름과 조언","is_current":false}]\n현재(${G.ka}세) 해당 대운만 is_current:true.`;try{const raw=await api('사주명리 전문가입니다. JSON만 반환하세요.',q);const clean=raw.replace(/```json|```/g,'').trim();const list=JSON.parse(clean.match(/\[[\s\S]*\]/)[0]);document.getElementById('d-list').innerHTML=list.map(item=>{const cl=EC[item.element]||'#c9a84c';return`<div class="dr"><div class="dd${item.is_current?' now':''}" style="border-color:${cl};color:${cl}"></div><div class="db${item.is_current?' now':''}"><div class="da">${item.age_start}~${item.age_end}세${item.is_current?' 👈 현재':''}</div><div class="dp2" style="color:${cl}">${item.pillar}</div><div class="dth">${item.theme}</div><div class="dds">${item.desc}</div></div></div>`;}).join('');document.getElementById('d-ldg').classList.add('hidden');document.getElementById('d-res').classList.remove('hidden');dLoaded=true;}catch(e){document.getElementById('d-ldg').classList.add('hidden');document.getElementById('d-list').innerHTML='<div class="err">오류가 발생했습니다.</div>';document.getElementById('d-res').classList.remove('hidden');}}
function selYr(v,el){pYr=v;document.querySelectorAll('#p-form .chip').forEach(c=>{if(['1년','3년','5년','10년'].includes(c.textContent))c.classList.remove('on');});el.classList.add('on');}
function togArea(v,el){if(pAr.includes(v)){pAr=pAr.filter(a=>a!==v);el.classList.remove('on');}else{pAr.push(v);el.classList.add('on');}}
async function genPlan(){if(!pYr){const e=document.getElementById('p-err');e.textContent='기간을 선택해주세요.';e.classList.remove('hidden');return;}if(!pAr.length){const e=document.getElementById('p-err');e.textContent='영역을 선택해주세요.';e.classList.remove('hidden');return;}document.getElementById('p-err').classList.add('hidden');document.getElementById('p-form').classList.add('hidden');document.getElementById('p-ldg').classList.remove('hidden');const goal=document.getElementById('p-goal').value;const q=`사주:${G.dc} 성별:${G.form.gender==='female'?'여성':'남성'} 나이:${G.ka}세\n계획:${pYr}년 영역:${pAr.join(',')}${goal?' 목표:'+goal:''}\nJSON 배열만 반환하세요:\n[{"period":"${new Date().getFullYear()}년","theme":"테마","goal":"목표","guidelines":["행동1","행동2","행동3"],"reason":"근거"}]\n${pYr==='10'?'4개':pYr+'개'} 항목.`;try{const raw=await api('사주명리 전문가입니다. JSON만 반환하세요.',q);const clean=raw.replace(/```json|```/g,'').trim();const list=JSON.parse(clean.match(/\[[\s\S]*\]/)[0]);document.getElementById('p-title').textContent=pYr+'년 맞춤 로드맵';document.getElementById('p-areas').textContent=pAr.join(' · ');document.getElementById('p-items').innerHTML=list.map(item=>`<div class="pi2"><div class="pp3">${item.period} · ${item.theme}</div><div class="pg3">${item.goal}</div><div class="pgd">${(item.guidelines||[]).map(g=>'· '+g+'<br>').join('')}</div><div class="pr">${item.reason}</div></div>`).join('');document.getElementById('p-ldg').classList.add('hidden');document.getElementById('p-res').classList.remove('hidden');}catch(e){document.getElementById('p-ldg').classList.add('hidden');document.getElementById('p-form').classList.remove('hidden');document.getElementById('p-err').textContent='오류.';document.getElementById('p-err').classList.remove('hidden');}}
function resetPlan(){document.getElementById('p-res').classList.add('hidden');document.getElementById('p-form').classList.remove('hidden');pYr='';pAr=[];document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));}
function resetAll(){clr();location.reload();}
window.addEventListener('DOMContentLoaded',()=>{try{const sv2=JSON.parse(localStorage.getItem('saju')||'{}');if(sv2?.saju&&sv2?.form){G.form=sv2.form;G.saju=sv2.saju;G.dc=sv2.dc||'';G.secs=sv2.secs||{};G.openSec=sv2.openSec||'s1';const y=parseInt(sv2.form.year);G.ka=new Date().getFullYear()-y+1;G.ma=new Date().getFullYear()-y;G.ds=ST[sv2.saju.day.s];show('s-main');document.getElementById('r-name').textContent=sv2.form.name||'명반 분석 결과';document.getElementById('r-meta').textContent=sv2.form.year+'.'+sv2.form.month+'.'+sv2.form.day+' '+sv2.form.hour+':'+sv2.form.minute.padStart(2,'0')+' · '+(sv2.form.gender==='female'?'여성':'남성');document.getElementById('mj-res').innerHTML=mjHTML(sv2.saju);initSecs();let done=0;SECS.forEach(s=>{const t=ldSec(s.id)||G.secs[s.id]?.t||null;if(t){G.secs[s.id]={t,done:true};updSec(s.id,'done',t);done++;}});updPrg(done,SECS.length);if(sv2.openSec){setTimeout(()=>{const sb=document.getElementById('sb-'+sv2.openSec);if(sb)sb.classList.add('open');},100);}if(done<SECS.length){(async()=>{for(const s of SECS){if(!G.secs[s.id]?.done){updSec(s.id,'run');try{const t=await api(SYS,makeQ(s.id,G.dc,G.ka,G.ma,G.ds));G.secs[s.id]={t,done:true};svSec(s.id,t);updSec(s.id,'done',t);}catch{updSec(s.id,'done','오류.');}done++;updPrg(done,SECS.length);sv();}}})();}}else{try{const sf=JSON.parse(localStorage.getItem('saju')||'{}');if(sf.form){const f=sf.form;['name','year','month','day','hour','minute'].forEach(k=>{const el=document.getElementById('f-'+k);if(el&&f[k])el.value=f[k];});if(f.gender)document.getElementById('f-gender').value=f.gender;}}catch{}}}catch(e){}});
document.addEventListener('visibilitychange',()=>{if(G.saju)sv();});
</script>
