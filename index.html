<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주봐 — AI 사주 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#08080f;color:#e8dcc8;font-family:'Noto Serif KR',serif;min-height:100vh;}
.hidden{display:none!important;}

/* 헤더 */
.hdr{text-align:center;padding:30px 20px 20px;border-bottom:1px solid rgba(201,168,76,.1);}
.hdr-badge{font-size:10px;letter-spacing:4px;color:#6a5a4a;margin-bottom:8px;}
.hdr-title{font-size:32px;font-weight:700;color:#c9a84c;letter-spacing:4px;}
.hdr-sub{font-size:12px;color:#6a5a4a;margin-top:8px;line-height:1.7;}

/* 폼 */
.form-wrap{padding:30px 20px;}
.form-lbl{font-size:10px;letter-spacing:3px;color:#c9a84c;display:block;margin-bottom:6px;margin-top:16px;}
.form-inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:9px;padding:12px 14px;color:#f0e6d0;font-family:inherit;font-size:14px;outline:none;}
.form-inp:focus{border-color:rgba(201,168,76,.5);}
select.form-inp option{background:#120e1c;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.start-btn{width:100%;margin-top:24px;padding:16px;background:linear-gradient(135deg,#b8922a,#e8c96a);border:none;border-radius:12px;color:#08080f;font-family:inherit;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;}
.start-btn:active{opacity:.85;}

/* 로딩 */
.loading-wrap{padding:80px 20px;text-align:center;}
.spin{display:inline-block;width:40px;height:40px;border:3px solid rgba(201,168,76,.2);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{margin-top:20px;color:#6a5a4a;font-size:13px;letter-spacing:2px;}

/* 결과 */
.result-wrap{padding:20px;}
.result-hd{text-align:center;padding:20px 0;margin-bottom:16px;}
.result-name{font-size:26px;color:#f0e6d0;font-weight:600;}
.result-meta{font-size:12px;color:#6a5a4a;margin-top:6px;}

/* 명식 테이블 */
.mj-wrap{background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.15);border-radius:14px;padding:20px;margin-bottom:20px;}
.mj-table{width:100%;border-collapse:collapse;}
.mj-table th{font-size:10px;color:#6a5a4a;padding:8px;text-align:center;letter-spacing:2px;}
.mj-table td{text-align:center;padding:8px;}
.mj-char{font-size:28px;color:#c9a84c;display:block;}
.mj-name{font-size:11px;color:#9a8a6a;display:block;margin-top:2px;}
.mj-elem{font-size:10px;color:#6a5a4a;display:block;}

/* 오행 색상 */
.wood{color:#4a9a4a!important;}
.fire{color:#e85c4a!important;}
.earth{color:#c9a84c!important;}
.metal{color:#aaaaaa!important;}
.water{color:#4a7aaa!important;}

/* 프로그레스 */
.prg-wrap{margin-bottom:20px;}
.prg-bar{height:4px;background:rgba(201,168,76,.15);border-radius:2px;overflow:hidden;}
.prg-fill{height:100%;background:linear-gradient(90deg,#b8922a,#e8c96a);width:0%;transition:width .3s;}
.prg-txt{font-size:10px;color:#6a5a4a;margin-top:6px;text-align:right;}

/* 섹션 */
.sec-item{margin-bottom:10px;border:1px solid rgba(201,168,76,.1);border-radius:12px;overflow:hidden;}
.sec-hd{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;background:rgba(255,255,255,.01);}
.sec-hd:hover{background:rgba(201,168,76,.04);}
.sec-icon{font-size:18px;}
.sec-ttl{flex:1;font-size:13px;font-weight:600;}
.sec-tag{font-size:10px;padding:2px 7px;border-radius:6px;}
.tag-free{color:#6db36d;background:rgba(109,179,109,.1);border:1px solid rgba(109,179,109,.2);}
.tag-lock{color:#c9a84c;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);}
.sec-st{font-size:10px;color:#6a5a4a;margin-left:8px;}
.sec-bd{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.sec-bd.open{max-height:2000px;}
.sec-txt{padding:16px;font-size:13px;line-height:1.9;color:#c8b88a;white-space:pre-wrap;}
.sec-txt h2{color:#c9a84c;font-size:15px;margin:14px 0 8px;border-left:3px solid #c9a84c;padding-left:10px;}
.sec-txt h3{color:#b8a07a;font-size:13px;margin:10px 0 6px;}
.sec-txt strong{color:#f0e6d0;}
.sec-txt ul{padding-left:16px;margin:8px 0;}
.sec-txt li{margin-bottom:4px;}

/* 잠금 */
.lock-wrap{padding:30px 20px;text-align:center;}
.lock-icon{font-size:40px;margin-bottom:16px;}
.lock-title{font-size:16px;color:#f0e6d0;font-weight:600;margin-bottom:8px;}
.lock-desc{font-size:12px;color:#9a8a6a;margin-bottom:20px;line-height:1.8;}
.lock-btn{display:inline-block;padding:13px 28px;background:linear-gradient(135deg,#b8922a,#e8c96a);border-radius:24px;color:#08080f;text-decoration:none;font-weight:700;font-size:13px;letter-spacing:1px;}
.lock-notice{font-size:10px;color:#6a5a4a;margin-top:12px;line-height:1.6;}

/* 구독 코드 입력 */
.code-wrap{background:rgba(0,0,0,.3);border:1px solid rgba(201,168,76,.15);border-radius:12px;padding:16px;margin-bottom:16px;}
.code-title{font-size:10px;letter-spacing:3px;color:#c9a84c;margin-bottom:10px;}
.code-row{display:flex;gap:8px;margin-bottom:8px;}
.code-inp{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:10px 12px;color:#f0e6d0;font-family:inherit;font-size:13px;outline:none;letter-spacing:2px;text-transform:uppercase;}
.code-inp:focus{border-color:rgba(201,168,76,.5);}
.email-inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:10px 12px;color:#f0e6d0;font-family:inherit;font-size:13px;outline:none;margin-bottom:8px;}
.email-inp:focus{border-color:rgba(201,168,76,.5);}
.code-btn{padding:10px 16px;background:linear-gradient(135deg,#b8922a,#e8c96a);border:none;border-radius:8px;color:#08080f;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.code-msg{font-size:11px;text-align:center;}
.code-msg.ok{color:#6db36d;}
.code-msg.err{color:#e08080;}
.sub-active{background:rgba(109,179,109,.08);border:1px solid rgba(109,179,109,.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#6db36d;}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-badge">SAJU봐</div>
  <div class="hdr-title">사주봐</div>
  <div class="hdr-sub">생년월일시만 입력하면<br>AI가 당신의 사주를 깊이 분석합니다</div>
</div>

<!-- 폼 화면 -->
<div id="s-form" class="form-wrap">
  <label class="form-lbl">이름 (선택)</label>
  <input class="form-inp" type="text" id="f-name" placeholder="예: 홍길동">

  <div class="form-row" style="margin-top:0;">
    <div>
      <label class="form-lbl">태어난 해</label>
      <input class="form-inp" type="number" id="f-year" placeholder="예: 1990" min="1900" max="2025">
    </div>
    <div>
      <label class="form-lbl">성별</label>
      <select class="form-inp" id="f-gender">
        <option value="female">여성</option>
        <option value="male">남성</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <div>
      <label class="form-lbl">월</label>
      <input class="form-inp" type="number" id="f-month" placeholder="예: 3" min="1" max="12">
    </div>
    <div>
      <label class="form-lbl">일</label>
      <input class="form-inp" type="number" id="f-day" placeholder="예: 15" min="1" max="31">
    </div>
  </div>

  <div class="form-row">
    <div>
      <label class="form-lbl">시 (24시간)</label>
      <input class="form-inp" type="number" id="f-hour" placeholder="예: 10" min="0" max="23">
    </div>
    <div>
      <label class="form-lbl">분</label>
      <input class="form-inp" type="number" id="f-minute" placeholder="예: 30" min="0" max="59">
    </div>
  </div>

  <button class="start-btn" onclick="startAnalysis()">내 사주 분석하기</button>
</div>

<!-- 로딩 화면 -->
<div id="s-loading" class="hidden">
  <div class="loading-wrap">
    <div class="spin"></div>
    <div class="loading-txt">명반을 읽고 있습니다…</div>
  </div>
</div>

<!-- 결과 화면 -->
<div id="s-main" class="hidden result-wrap">
  <div class="result-hd">
    <div class="result-name" id="r-name"></div>
    <div class="result-meta" id="r-meta"></div>
  </div>

  <!-- 명식 -->
  <div class="mj-wrap">
    <div id="mj-res"></div>
  </div>

  <!-- 구독 상태 -->
  <div id="sub-status"></div>

  <!-- 구독 코드 입력 -->
  <div id="code-section" class="code-wrap">
    <div class="code-title">✦ 구독 코드 입력</div>
    <input class="email-inp" type="email" id="email-input" placeholder="이메일 주소">
    <div class="code-row">
      <input class="code-inp" id="code-input" placeholder="코드 8자리" maxlength="8">
      <button class="code-btn" onclick="submitCode()">적용</button>
    </div>
    <div class="code-msg" id="code-msg"></div>
    <div style="margin-top:10px;font-size:10px;color:#6a5a4a;text-align:center;">
      구독 후 이메일로 코드를 받으세요 · <a href="https://qr.kakaopay.com/Ej8YEKUhZ9c403436" target="_blank" style="color:#c9a84c;">구독하기 ₩5,000</a>
    </div>
  </div>

  <!-- 프로그레스 -->
  <div class="prg-wrap">
    <div class="prg-bar"><div class="prg-fill" id="prg-fill"></div></div>
    <div class="prg-txt" id="prg-txt">분석 준비 중…</div>
  </div>

  <!-- 섹션 목록 -->
  <div id="sec-list"></div>

  <div style="margin-top:20px;text-align:center;">
    <button onclick="location.reload()" style="background:none;border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:10px 20px;color:#6a5a4a;font-size:12px;cursor:pointer;">새로 분석하기</button>
  </div>
</div>

<script>
// ============ 사주 계산 ============
const 천간 = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const 지지 = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const 천간명 = ['갑','을','병','정','무','기','경','신','임','계'];
const 지지명 = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
const 오행천간 = ['목','목','화','화','토','토','금','금','수','수'];
const 오행지지 = ['수','토','목','목','토','화','화','토','금','금','토','수'];
const 오행색 = {목:'wood',화:'fire',토:'earth',금:'metal',수:'water'};

function getGanjiYear(year) {
  const g = (year - 4) % 10;
  const j = (year - 4) % 12;
  return {
    c: 천간[(g+10)%10] + 지지[(j+12)%12],
    cn: 천간명[(g+10)%10] + 지지명[(j+12)%12],
    g: (g+10)%10, j: (j+12)%12
  };
}

function getGanjiMonth(year, month) {
  // 월간 계산 (연간 기반)
  const yg = (year - 4) % 10;
  const baseG = ((Math.floor(((yg+10)%10)/2)) * 2 + 2) % 10;
  const mg = (baseG + month - 1) % 10;
  const mj = (month + 1) % 12;
  return {
    c: 천간[mg] + 지지[mj],
    cn: 천간명[mg] + 지지명[mj],
    g: mg, j: mj
  };
}

function getGanjiDay(year, month, day) {
  // 갑자일 기준 계산
  const base = new Date(2000, 0, 7); // 2000년 1월 7일 = 甲子일
  const target = new Date(year, month - 1, day);
  const diff = Math.round((target - base) / 86400000);
  const g = ((diff % 10) + 10) % 10;
  const j = ((diff % 12) + 12) % 12;
  return {
    c: 천간[g] + 지지[j],
    cn: 천간명[g] + 지지명[j],
    g: g, j: j
  };
}

function getGanjiHour(dayG, hour) {
  // 시간 → 지지 (2시간 단위)
  const hj = Math.floor((hour + 1) / 2) % 12;
  // 일간 기반 시간 천간
  const baseG = (dayG % 5) * 2;
  const hg = (baseG + hj) % 10;
  return {
    c: 천간[hg] + 지지[hj],
    cn: 천간명[hg] + 지지명[hj],
    g: hg, j: hj
  };
}

function calcSaju(year, month, day, hour) {
  const yr = getGanjiYear(year);
  const mo = getGanjiMonth(year, month);
  const dy = getGanjiDay(year, month, day);
  const hr = getGanjiHour(dy.g, hour);
  return { year: yr, month: mo, day: dy, time: hr };
}

function mjHTML(sj) {
  const cols = [
    {label:'년주', data:sj.year},
    {label:'월주', data:sj.month},
    {label:'일주', data:sj.day},
    {label:'시주', data:sj.time}
  ];
  return `<table class="mj-table">
    <tr>
      ${cols.map(c=>`<th>${c.label}</th>`).join('')}
    </tr>
    <tr>
      ${cols.map(c=>{
        const g=c.data.g;
        const 오=오행천간[g];
        return`<td><span class="mj-char ${오행색[오]}">${천간[g]}</span><span class="mj-name">${천간명[g]}</span><span class="mj-elem">${오}</span></td>`;
      }).join('')}
    </tr>
    <tr>
      ${cols.map(c=>{
        const j=c.data.j;
        const 오=오행지지[j];
        return`<td><span class="mj-char ${오행색[오]}">${지지[j]}</span><span class="mj-name">${지지명[j]}</span><span class="mj-elem">${오}</span></td>`;
      }).join('')}
    </tr>
  </table>`;
}

// ============ 섹션 정의 ============
const SECS = [
  {id:'s1', i:'✨', t:'일간 성격과 기질'},
  {id:'s2', i:'⚖️', t:'오행 구조와 용신'},
  {id:'s3', i:'🎯', t:'핵심 재능 키워드'},
  {id:'s4', i:'💼', t:'직업·커리어 방향'},
  {id:'s5', i:'💰', t:'재물운 구조'},
  {id:'s6', i:'❤️', t:'연애·결혼 에너지'},
  {id:'s7', i:'🏃', t:'현재 대운 분석'},
  {id:'s8', i:'⚡', t:'주의할 점'},
  {id:'s9', i:'🌟', t:'강점과 재능'},
  {id:'s10', i:'⏳', t:'생애 흐름 현재~40대'},
  {id:'s11', i:'🎯', t:'생애 흐름 40대~70대'},
  {id:'s12', i:'🗺️', t:'종합 정리'}
];

const FREE_SECS = ['s1','s2','s3'];
const KAKAO_URL = 'https://qr.kakaopay.com/Ej8YEKUhZ9c403436';

let G = {form:{}, saju:{}, secs:{}, dc:''};

// ============ 구독 관리 ============
function isSubscribed() {
  const exp = localStorage.getItem('saju-sub-exp');
  if (!exp) return false;
  return new Date().getTime() < parseInt(exp);
}

function getSubDays() {
  const exp = localStorage.getItem('saju-sub-exp');
  if (!exp) return 0;
  const ms = parseInt(exp) - new Date().getTime();
  return Math.max(0, Math.ceil(ms / 86400000));
}

function updateSubUI() {
  const statusEl = document.getElementById('sub-status');
  const codeEl = document.getElementById('code-section');
  if (isSubscribed()) {
    const days = getSubDays();
    if (statusEl) statusEl.innerHTML = `<div class="sub-active">✅ 구독 중 · 잔여 ${days}일</div>`;
    if (codeEl) codeEl.style.display = 'none';
  } else {
    if (statusEl) statusEl.innerHTML = '';
    if (codeEl) codeEl.style.display = 'block';
  }
}

async function submitCode() {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  const msg = document.getElementById('code-msg');
  if (!email) { msg.className='code-msg err'; msg.textContent='이메일을 입력해주세요.'; return; }
  if (!code || code.length < 6) { msg.className='code-msg err'; msg.textContent='코드를 입력해주세요.'; return; }
  msg.className='code-msg'; msg.textContent='확인 중…';
  try {
    const res = await fetch('/api/admin', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'verify', code, email})
    });
    const data = await res.json();
    if (data.valid) {
      const exp = new Date().getTime() + (data.days * 24 * 60 * 60 * 1000);
      localStorage.setItem('saju-sub-exp', exp.toString());
      localStorage.setItem('saju-sub-email', email);
      msg.className='code-msg ok';
      msg.textContent=`✓ 구독 활성화! ${data.days}일 이용 가능합니다.`;
      setTimeout(() => {
        updateSubUI();
        SECS.forEach(s => {
          if (!FREE_SECS.includes(s.id) && G.secs[s.id] && G.secs[s.id].t) {
            updSec(s.id, 'done', G.secs[s.id].t);
          }
        });
      }, 1000);
    } else {
      msg.className='code-msg err';
      msg.textContent = data.error || '유효하지 않은 코드입니다.';
    }
  } catch(e) {
    msg.className='code-msg err';
    msg.textContent='서버 오류. 잠시 후 다시 시도해주세요.';
  }
}

// ============ 섹션 UI ============
function initSecs() {
  const l = document.getElementById('sec-list');
  l.innerHTML = SECS.map(s => {
    const isFree = FREE_SECS.includes(s.id);
    const tag = isFree
      ? '<span class="sec-tag tag-free">무료</span>'
      : '<span class="sec-tag tag-lock">🔒 구독</span>';
    return `<div class="sec-item" id="si-${s.id}">
      <div class="sec-hd" onclick="togSec('${s.id}')">
        <span class="sec-icon">${s.i}</span>
        <span class="sec-ttl">${s.t} ${tag}</span>
        <span class="sec-st" id="st-${s.id}">대기</span>
      </div>
      <div class="sec-bd" id="sb-${s.id}">
        <div class="sec-txt" id="txt-${s.id}"></div>
      </div>
    </div>`;
  }).join('');
}

function togSec(id) {
  const b = document.getElementById('sb-' + id);
  const open = b.classList.contains('open');
  document.querySelectorAll('.sec-bd').forEach(x => x.classList.remove('open'));
  if (!open) {
    if (!FREE_SECS.includes(id) && !isSubscribed()) {
      b.classList.add('open');
      const tx = document.getElementById('txt-' + id);
      if (!tx.dataset.locked) {
        tx.dataset.locked = '1';
        tx.innerHTML = `<div class="lock-wrap">
          <div class="lock-icon">🔒</div>
          <div class="lock-title">구독 후 전체 내용을 확인하세요</div>
          <div class="lock-desc">월 5,000원으로 12개 섹션 전체 무제한</div>
          <a class="lock-btn" href="${KAKAO_URL}" target="_blank">카카오페이로 구독하기 ₩5,000</a>
          <div class="lock-notice">입금 후 카카오톡으로 입금자명을 보내주세요</div>
        </div>`;
      }
    } else {
      b.classList.add('open');
    }
  }
}

function updPrg(done, total) {
  const pct = Math.round(done * 100 / total);
  document.getElementById('prg-fill').style.width = pct + '%';
  document.getElementById('prg-txt').textContent = done + ' / ' + total + ' 완료';
}

function updSec(id, status, text) {
  const st = document.getElementById('st-' + id);
  if (!st) return;
  st.textContent = status === 'done' ? '완료' : status === 'run' ? '분석 중…' : '대기';
  if (text) {
    const tx = document.getElementById('txt-' + id);
    if (!FREE_SECS.includes(id) && !isSubscribed()) {
      // 유료 섹션 — 잠금 표시
      if (!tx.dataset.locked) {
        tx.dataset.locked = '1';
        const preview = text.slice(0, 50) + '…';
        tx.innerHTML = `<p style="color:#4a3a2a;font-size:12px;margin-bottom:12px;filter:blur(3px);">${preview}</p>
        <div class="lock-wrap">
          <div class="lock-icon">🔒</div>
          <div class="lock-title">구독 후 전체 내용을 확인하세요</div>
          <div class="lock-desc">월 5,000원으로 12개 섹션 전체 무제한</div>
          <a class="lock-btn" href="${KAKAO_URL}" target="_blank">카카오페이로 구독하기 ₩5,000</a>
          <div class="lock-notice">입금 후 카카오톡으로 입금자명을 보내주세요</div>
        </div>`;
      }
    } else {
      tx.textContent = text;
    }
  }
}

// ============ API 호출 ============
async function api(sys, msg) {
  const r = await fetch('/api/analyze', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({system: sys, user: msg})
  });
  if (!r.ok) throw new Error('API 오류');
  const d = await r.json();
  return d.text || '오류';
}

const SYS = `당신은 사주명리학 전문가입니다.
1. 사주 명식은 정확히 계산된 것이므로 절대 수정하지 마세요.
2. 모든 분석에 반드시 명리적 근거(어떤 기둥, 어떤 오행, 어떤 십성)를 포함하세요.
3. 긍정적인 면과 주의할 점을 균형 있게 서술하세요.
4. 차분하고 신뢰감 있는 말투로, 한국어로만 답하세요.
5. 구조적으로 명확하게 답하되, 코드블럭과 표는 사용하지 마세요.`;

function makePrompt(id, dc) {
  const sec = SECS.find(x => x.id === id);
  return `사주 명식: ${dc}\n\n분석 항목: ${sec.t}\n\n위 사주를 바탕으로 "${sec.t}"에 대해 상세히 분석해주세요.`;
}

// ============ 분석 시작 ============
function show(id) {
  ['s-form','s-loading','s-main'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
  if (id === 's-main') setTimeout(updateSubUI, 100);
}

async function startAnalysis() {
  const nm = document.getElementById('f-name').value.trim();
  const yr = parseInt(document.getElementById('f-year').value);
  const mo = parseInt(document.getElementById('f-month').value);
  const dy = parseInt(document.getElementById('f-day').value);
  const hr = parseInt(document.getElementById('f-hour').value);
  const mn = parseInt(document.getElementById('f-minute').value);
  const gd = document.getElementById('f-gender').value;

  if (!yr || !mo || !dy || isNaN(hr) || isNaN(mn)) {
    alert('생년월일시를 모두 입력해주세요.');
    return;
  }

  show('s-loading');

  try {
    // 사주 계산
    const sj = calcSaju(yr, mo, dy, hr);
    const dc = `${sj.year.c} ${sj.month.c} ${sj.day.c} ${sj.time.c} (${yr}년 ${mo}월 ${dy}일 ${hr}시, ${gd === 'female' ? '여성' : '남성'})`;

    G.form = {name:nm, year:yr, month:mo, day:dy, hour:hr, minute:mn, gender:gd};
    G.saju = sj;
    G.dc = dc;

    show('s-main');
    document.getElementById('r-name').textContent = nm || '명반 분석 결과';
    document.getElementById('r-meta').textContent =
      yr + '.' + mo + '.' + dy + ' ' +
      String(hr).padStart(2,'0') + ':' + String(mn).padStart(2,'0') +
      ' · ' + (gd === 'female' ? '여성' : '남성');
    document.getElementById('mj-res').innerHTML = mjHTML(sj);
    initSecs();

    let done = 0;
    for (let i = 0; i < SECS.length; i += 6) {
      const chunk = SECS.slice(i, i + 6);
      await Promise.all(chunk.map(async s => {
        updSec(s.id, 'run');
        try {
          const t = await api(SYS, makePrompt(s.id, dc));
          G.secs[s.id] = {t, done: true};
          updSec(s.id, 'done', t);
        } catch(e) {
          G.secs[s.id] = {t:'오류.', done: true};
          updSec(s.id, 'done', '오류.');
        }
        done++;
        updPrg(done, SECS.length);
        if (done === 1) {
          setTimeout(() => {
            const sb = document.getElementById('sb-s1');
            if (sb) sb.classList.add('open');
          }, 200);
        }
      }));
    }
  } catch(e) {
    alert('오류가 발생했습니다: ' + e.message);
    show('s-form');
  }
}

window.addEventListener('DOMContentLoaded', () => {});
</script>
